<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Background circle for the icon -->
  <circle cx="50" cy="50" r="45" fill="#5da3d6" opacity="0.2" />

  <!-- Parent nodes -->
  <circle cx="30" cy="30" r="8" fill="#5da3d6" />
  <circle cx="70" cy="30" r="8" fill="#5da3d6" />

  <!-- Line connecting parent nodes -->
  <line x1="38" y1="30" x2="62" y2="30" stroke="#5da3d6" stroke-width="2" />

  <!-- Child node -->
  <circle cx="50" cy="60" r="8" fill="#5da3d6" />

  <!-- Lines connecting parents to child -->
  <line x1="35" y1="38" x2="50" y2="52" stroke="#5da3d6" stroke-width="2" />
  <line x1="65" y1="38" x2="50" y2="52" stroke="#5da3d6" stroke-width="2" />

  <!-- Additional child node -->
  <circle cx="50" cy="80" r="6" fill="#5da3d6" opacity="0.7" />
  <line x1="50" y1="68" x2="50" y2="74" stroke="#5da3d6" stroke-width="1.5" />
</svg>